# Standard OIDC Configuration
quarkus.oidc.auth-server-url=http://localhost:8180/realms/myrealm
quarkus.oidc.client-id=myclient
# Replace with your actual client secret from Keycloak
quarkus.oidc.credentials.secret=YOUR_CLIENT_SECRET
quarkus.oidc.application-type=web-app

# Disable proactive authentication to avoid state verification on the local custom login page
quarkus.http.auth.proactive=false

# Override Quarkus OIDC's authorization path to point to your LOCAL custom login endpoint
quarkus.oidc.authorization-path=http://localhost:8080/custom-login

# Store the ACTUAL provider's auth endpoint to be injected into our custom page
actual.provider.authorization.url=http://localhost:8180/realms/myrealm/protocol/openid-connect/auth
