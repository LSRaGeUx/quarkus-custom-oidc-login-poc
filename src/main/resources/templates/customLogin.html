<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Branded App Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .btn { display: inline-block; margin-top: 1.5rem; padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Welcome to My Application</h1>
        <p>Please click the button below to authenticate.</p>
        <a href="{targetUrl}" class="btn">Sign in with Provider</a>
    </div>
</body>
</html>
